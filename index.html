<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رمز الدخول</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* مربع الرمز */
.key-box{
  width:280px;
  max-width:90%;
  background:rgba(17,24,39,0.9);
  padding:30px 20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 15px #38bdf8;
  transition: all 0.3s ease;
  position:relative;
}
.key-box.green{
  animation:greenGlow 1s infinite alternate;
}
@keyframes greenGlow{
  0%{box-shadow:0 0 15px #22c55e;}
  50%{box-shadow:0 0 30px #22c55e;}
  100%{box-shadow:0 0 50px #22c55e;}
}
.key-box.red{
  box-shadow:0 0 25px #ff5555,0 0 50px #ff5555AA,0 0 75px #ff5555;
  border:2px solid #ff5555;
  animation:shake 0.3s;
}
@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
  100%{transform:translateX(0);}
}
.key-box input{
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  width:80%;
  margin-bottom:15px;
  text-align:center;
  font-size:16px;
  color:#87ceeb;
  background:linear-gradient(135deg,#87ceeb33,#dda0dd33);
  box-shadow:0 0 10px #87ceeb55,0 0 10px #dda0dd55 inset;
}
.key-box button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-size:16px;
}
.error-msg{
  color:#ff5555;
  margin-top:10px;
  display:none;
}

/* مربع رامي تحبني */
.ramy-box{
  width:320px;
  max-width:90%;
  background:rgba(17,24,39,0.9);
  padding:30px 20px;
  border-radius:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:white;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:none;
  border:6px solid;
  animation:rainbowBorder 3s linear infinite;
}
@keyframes rainbowBorder{
  0%{border-color:red;}
  14%{border-color:orange;}
  28%{border-color:yellow;}
  42%{border-color:green;}
  57%{border-color:blue;}
  71%{border-color:indigo;}
  85%{border-color:violet;}
  100%{border-color:red;}
}

/* أزرار نعم ولا */
.choice-buttons{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}
.choice-buttons button{
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
  color:white;
  box-shadow:0 0 10px #38bdf8;
}
.yes-btn{background:#22c55e;}
.no-btn{background:#ff5555;}

/* العدّاد الدائري */
.countdown{
  position:absolute;
  bottom:10px;
  left:10px;
  width:40px;
  height:40px;
  border-radius:50%;
  border:3px solid #22c55e;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:white;
  font-size:18px;
  display:none;
  animation:glow 1s infinite alternate;
}
@keyframes glow{
  0%{box-shadow:0 0 5px #22c55e;}
  100%{box-shadow:0 0 15px #22c55e;}
}

/* واجهة نعم */
.yes-box, .no-box{
  width:350px;
  max-width:95%;
  background:rgba(17,24,39,0.9);
  padding:30px 20px;
  border-radius:20px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  color:white;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:none;
  border:6px solid;
  animation:rainbowBorder 3s linear infinite;
}
.back-btn{
  position:absolute;
  bottom:10px;
  left:10px;
  width:40px;
  height:40px;
  border-radius:50%;
  background:#38bdf8;
  border:none;
  font-size:20px;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* الرموز المتحركة */
.emoji{
  position:absolute;
  font-size:24px;
  animation:fall 5s linear infinite;
}
@keyframes fall{
  0%{top:-30px;}
  100%{top:100vh;}
}

.firework{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:yellow;
  box-shadow:0 0 10px red,0 0 10px blue,0 0 10px green;
  animation:explode 1s linear infinite;
}
@keyframes explode{
  0%{transform:scale(0);}
  50%{transform:scale(1);}
  100%{transform:scale(0);}
}

@media(max-width:768px){
  .key-box,.ramy-box,.yes-box,.no-box{width:90%;}
}
</style>
</head>
<body>

<div class="key-box" id="keyBox">
  <h2>أدخل الرمز</h2>
  <input type="password" id="keyInput" placeholder="أدخل الرمز">
  <br>
  <button onclick="checkKey()">دخول</button>
  <div class="error-msg" id="errorMsg">رمز خاطئ!</div>
  <div class="countdown" id="countdownKey">3</div>
</div>

<div class="ramy-box" id="ramyBox">
  رامي تحبني
  <div class="choice-buttons">
    <button class="yes-btn" onclick="pressYes()">نعم</button>
    <button class="no-btn" onclick="pressNo()">لا</button>
  </div>
</div>

<div class="yes-box" id="yesBox">
  اموت عليك هاي سيارة تاهو مني للكا 🚗
  <button class="back-btn" onclick="backToRamy()">↩</button>
</div>

<div class="no-box" id="noBox">
  امشي لك الفگر 😭
  <button class="back-btn" onclick="backToRamy()">↩</button>
</div>

<audio id="fireworkSound" src="https://www.soundjay.com/mechanical/sounds/explosion-01.mp3"></audio>
<audio id="crySound" src="https://www.soundjay.com/human/sounds/baby-crying-01.mp3"></audio>

<script>
const correctKey = "ramy";
const keyBox = document.getElementById("keyBox");
const errorMsg = document.getElementById("errorMsg");
const ramyBox = document.getElementById("ramyBox");
const countdownKey = document.getElementById("countdownKey");
const yesBox = document.getElementById("yesBox");
const noBox = document.getElementById("noBox");
const fireworkSound = document.getElementById("fireworkSound");
const crySound = document.getElementById("crySound");

function checkKey(){
  const input = document.getElementById("keyInput").value;
  if(input === correctKey){
    // رمز صحيح
    errorMsg.style.display="none";
    keyBox.classList.add("green");

    // اظهار العدّاد
    countdownKey.style.display="flex";
    let count = 3;
    countdownKey.innerText = count;

    let interval = setInterval(()=>{
      count--;
      if(count>0){
        countdownKey.innerText=count;
      }else{
        clearInterval(interval);
        countdownKey.style.display="none";
        keyBox.style.display="none";
        ramyBox.style.display="block";
      }
    },1000);
  }else{
    // رمز خاطئ
    errorMsg.style.display="block";
    keyBox.classList.add("red");
    setTimeout(()=>{ keyBox.classList.remove("red"); },500);
  }
}

function pressYes(){
  ramyBox.style.display="none";
  yesBox.style.display="block";
  fireworkSound.play();
  // إنشاء ألعاب نارية متكررة
  for(let i=0;i<50;i++){
    let fw = document.createElement("div");
    fw.className="firework";
    fw.style.top=Math.random()*window.innerHeight+"px";
    fw.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(fw);
    setTimeout(()=>{ fw.remove(); },3000);
  }
}

function pressNo(){
  ramyBox.style.display="none";
  noBox.style.display="block";
  crySound.play();
  for(let i=0;i<100;i++){
    let emoji = document.createElement("div");
    emoji.className="emoji";
    emoji.style.left=Math.random()*window.innerWidth+"px";
    emoji.style.animationDuration=(3+Math.random()*2)+"s";
    emoji.innerText="😭";
    document.body.appendChild(emoji);
    setTimeout(()=>{ emoji.remove(); },4000);
  }
}

function backToRamy(){
  yesBox.style.display="none";
  noBox.style.display="none";
  ramyBox.style.display="block";
  fireworkSound.pause();
  fireworkSound.currentTime=0;
  crySound.pause();
  crySound.currentTime=0;
}
</script>

</body>
</html>
